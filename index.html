<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="stylesheet" href="/slds/icons.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mirador</title>
    <style>
      #app-splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #f6f5f2;
        background-image: radial-gradient(1100px 600px at 75% -15%, rgba(0, 128, 190, 0.05), transparent 60%);
      }

      .app-splash__inner {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 15px;
      }

      .app-splash__mark {
        width: 52px;
        height: auto;
      }

      .app-splash__ring {
        width: 30px;
        height: 30px;
        border: 2px solid rgba(0, 128, 190, 0.1);
        border-top-color: #0080be;
        border-radius: 50%;
        animation: app-splash-spin 0.85s linear infinite;
      }

      .app-splash__status {
        margin: 0;
        font: 500 13px/1.5 'Inter', system-ui, sans-serif;
        letter-spacing: 0.05em;
        text-transform: uppercase;
        color: #9c98a6;
      }

      @keyframes app-splash-spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div id="app-splash" class="app-splash" aria-live="polite" aria-busy="true">
      <div class="app-splash__inner">
        <img class="app-splash__mark" src="/favicon.svg" width="52" height="50" alt="" />
        <div class="app-splash__ring" aria-hidden="true"></div>
        <p class="app-splash__status">Carregant…</p>
      </div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
