version: 2

updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: daily
    open-pull-requests-limit: 10
    # typescript-eslint peer is still `>=4.8.4 <6.1.0`; a TS 7 bump
    # breaks `npm ci` in CI. exclude-patterns only keeps it out of the
    # group — Dependabot still opens a solo PR — so ignore it entirely.
    ignore:
      - dependency-name: "typescript"
        versions: [">=7"]
    groups:
      production-dependencies:
        dependency-type: production
      development-dependencies:
        dependency-type: development
        exclude-patterns:
          - "typescript"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
